name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated checkout version for better performance

      - name: Push to Hub
        uses: huggingface/hub-sync@v0.1.0 # <-- Change this version to v0.1.0 here!
        with:
          github_repo_id: shahid-nawazai/Heart-Disease-Prediction-Live-Website
          huggingface_repo_id: shahid-nawazai/heart-disease-prediction
          hf_token: ${{ secrets.HF_TOKEN }}
